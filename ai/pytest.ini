[pytest]
testpaths = tests
asyncio_mode = auto
# Coverage measures the WHOLE app/ package (was a per-module subset that gamed
# the 80% gate). The floor is a ratchet: set at/just-below current whole-package
# coverage so it enforces "don't regress" without forcing a large test-writing push.
# TODO(W0-T06): ratchet toward 70% as module coverage improves.
addopts = --cov=app --cov-report=term-missing --cov-fail-under=35
