# Aurora Reverb WebSocket proxy.
#
# Paste this block INSIDE the <VirtualHost *:443> for aurora.acumenus.net
# (file: /etc/apache2/sites-available/aurora.acumenus.net-le-ssl.conf), above
# the SPA fallback. Requires these modules (enable once):
#
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite
#
# The browser opens wss://aurora.acumenus.net/app/<key>; this upgrades and
# tunnels it to the local Reverb server (aurora-reverb.service on 127.0.0.1:8080).
# Server-side broadcasts reach Reverb directly on localhost and do not pass here.

RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/app/(.*)$ ws://127.0.0.1:8080/app/$1 [P,L]

ProxyPass        /app  ws://127.0.0.1:8080/app
ProxyPassReverse /app  ws://127.0.0.1:8080/app
ProxyPreserveHost On
