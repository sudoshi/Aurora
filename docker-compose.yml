services:
  nginx:
    container_name: aurora-nginx
    image: nginx:1.27-alpine
    ports: ["${NGINX_PORT:-8085}:80"]
    environment:
      # Injected into the nginx config at startup via the official envsubst
      # entrypoint. FILTER scopes substitution to this one var so nginx's own
      # $host/$uri/etc. are preserved. Set ORTHANC_PROXY_AUTH in the root .env.
      ORTHANC_PROXY_AUTH: "${ORTHANC_PROXY_AUTH:-}"
      NGINX_ENVSUBST_FILTER: "ORTHANC_PROXY_AUTH"
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      php:
        condition: service_healthy
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [aurora]
    restart: unless-stopped

  php:
    container_name: aurora-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes: ["./backend:/var/www/html"]
    env_file: [backend/.env]
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [aurora]
    restart: unless-stopped

  node:
    container_name: aurora-node
    image: node:22-alpine
    working_dir: /app
    command: sh -c "[ -d node_modules/.package-lock.json ] && npm run dev || npm install && npm run dev"
    ports: ["${VITE_PORT:-5177}:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment: [NODE_ENV=development]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [aurora]
    profiles: [dev]
    restart: unless-stopped

  redis:
    container_name: aurora-redis
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6385}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aurora]
    restart: unless-stopped

  mailhog:
    container_name: aurora-mailhog
    image: mailhog/mailhog
    ports: ["${MAILHOG_UI_PORT:-8030}:8025", "${MAILHOG_SMTP_PORT:-1030}:1025"]
    networks: [aurora]
    profiles: [dev]

networks:
  aurora:
    driver: bridge
