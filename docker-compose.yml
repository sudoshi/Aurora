services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["${NGINX_PORT:-8085}:80"]
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
    depends_on:
      php:
        condition: service_healthy
    networks: [aurora]
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes: [".:/var/www/html"]
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [aurora]
    restart: unless-stopped

  node:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev
    ports: ["${VITE_PORT:-5177}:5173"]
    volumes: [".:/app", "/app/node_modules"]
    environment: [NODE_ENV=development]
    networks: [aurora]
    profiles: [dev]

  postgres:
    image: postgres:16-alpine
    ports: ["${POSTGRES_PORT:-5485}:5432"]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aurora}
      POSTGRES_USER: ${DB_USERNAME:-aurora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aurora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aurora]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6385}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aurora]
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    ports: ["${MAILHOG_UI_PORT:-8030}:8025", "${MAILHOG_SMTP_PORT:-1030}:1025"]
    networks: [aurora]
    profiles: [dev]

networks:
  aurora:
    driver: bridge

volumes:
  postgres_data:
