# Optional overlays (AI/"Abby" service + GA4GH VRS anyvar) are folded into this
# project via `include` so the whole Aurora stack lives under one compose project
# with consistently-named containers. They reach host PG/Ollama via
# host.docker.internal and publish their own host ports, so no shared network is
# required. `docker compose up -d` now brings the full stack.
include:
  - docker/ai/docker-compose.ai.yml
  - docker/vrs/docker-compose.vrs.yml

services:
  nginx:
    container_name: aurora-nginx
    image: nginx:1.27-alpine
    ports: ["${NGINX_PORT:-8085}:80"]
    environment:
      # Injected into the nginx config at startup via the official envsubst
      # entrypoint. FILTER scopes substitution to this one var so nginx's own
      # $host/$uri/etc. are preserved. Set ORTHANC_PROXY_AUTH in the root .env.
      ORTHANC_PROXY_AUTH: "${ORTHANC_PROXY_AUTH:-}"
      NGINX_ENVSUBST_FILTER: "ORTHANC_PROXY_AUTH"
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      php:
        condition: service_healthy
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      # Exercises the full nginx→php-fpm chain via the liveness probe.
      # Use 127.0.0.1, not localhost: nginx listens IPv4-only, while localhost
      # resolves to ::1 first in the alpine image and the probe would hang/fail.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [aurora]
    restart: unless-stopped

  php:
    container_name: aurora-php
    deploy:
      resources:
        limits:
          memory: 1024M
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes: ["./backend:/var/www/html"]
    env_file: [backend/.env]
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [aurora]
    restart: unless-stopped

  # Laravel Reverb WebSocket server. Opt-in via `--profile realtime` so the
  # default dev stack is unaffected; needs REVERB_* in backend/.env (see
  # .env.example) matching the php service so broadcast signatures line up.
  reverb:
    container_name: aurora-reverb
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes: ["./backend:/var/www/html"]
    env_file: [backend/.env]
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [aurora]
    profiles: [realtime]
    restart: unless-stopped

  node:
    container_name: aurora-node
    image: node:22-alpine
    working_dir: /app
    command: sh -c "[ -d node_modules/.package-lock.json ] && npm run dev || npm install && npm run dev"
    ports: ["${VITE_PORT:-5177}:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment: [NODE_ENV=development]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [aurora]
    profiles: [dev]
    restart: unless-stopped

  redis:
    container_name: aurora-redis
    deploy:
      resources:
        limits:
          memory: 512M
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6385}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aurora]
    restart: unless-stopped

  mailhog:
    container_name: aurora-mailhog
    image: mailhog/mailhog
    ports: ["${MAILHOG_UI_PORT:-8030}:8025", "${MAILHOG_SMTP_PORT:-1030}:1025"]
    networks: [aurora]
    profiles: [dev]

networks:
  aurora:
    driver: bridge
