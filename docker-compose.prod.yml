services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=aurora
      - DB_USERNAME=aurora
      - DB_PASSWORD=${DB_PASSWORD:-aurora}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://ai:8100
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [aurora]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    depends_on: [api]
    networks: [aurora]
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    volumes:
      - aurora_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=aurora
      - POSTGRES_USER=aurora
      - POSTGRES_PASSWORD=${DB_PASSWORD:-aurora}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aurora]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [aurora]
    restart: unless-stopped

  ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - DATABASE_URL=postgresql://aurora:${DB_PASSWORD:-aurora}@db:5432/aurora
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    networks: [aurora]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: php artisan queue:work --tries=3 --timeout=300
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=aurora
      - DB_USERNAME=aurora
      - DB_PASSWORD=${DB_PASSWORD:-aurora}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://ai:8100
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [aurora]
    restart: unless-stopped

  federation:
    build:
      context: .
      dockerfile: docker/Dockerfile.federation
    ports:
      - "${FEDERATION_PORT:-8200}:8200"
    environment:
      - FEDERATION_PORT=8200
      - DATABASE_URL=postgresql://aurora:${DB_PASSWORD:-aurora}@db:5432/aurora
    depends_on: [ai]
    networks: [aurora]
    restart: unless-stopped

networks:
  aurora:
    driver: bridge

volumes:
  aurora_db:
