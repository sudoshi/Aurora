services:
  nginx:
    # Overrides the base template at the same target path; ORTHANC_PROXY_AUTH /
    # NGINX_ENVSUBST_FILTER are inherited from docker-compose.yml.
    volumes:
      - ./docker/nginx/dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      php:
        condition: service_healthy
      node:
        condition: service_started
