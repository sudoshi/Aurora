name: Aurora CI

on:
  push:
    branches: [main, "v2/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Backend: lint + static analysis + tests ────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, mbstring, bcmath, intl, zip, redis
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (code style)
        working-directory: backend
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        working-directory: backend
        run: |
          if [ -f vendor/bin/phpstan ]; then
            ./vendor/bin/phpstan analyse --memory-limit=512M
          else
            echo "PHPStan not installed, skipping"
          fi

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend-lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U aurora"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, pcntl, zip, redis
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare env
        working-directory: backend
        run: cp .env.example .env && php artisan key:generate

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_test
          DB_USERNAME: aurora
          DB_PASSWORD: secret
          DB_MIGRATIONS_TABLE: public.migrations

      # Coverage floor is a ratchet: --min is set just below current line
      # coverage (measured 59.4% via pcov, 2026-06-20) so CI enforces
      # "don't regress" without forcing a big test-writing push. xdebug is
      # installed (coverage: xdebug above); XDEBUG_MODE=coverage lets Pest
      # collect. memory_limit is raised because coverage report generation
      # OOMs at PHP's 128M default. Ratchet --min up toward 70% over time. [W0-T07]
      - name: Pest tests
        working-directory: backend
        run: php -d memory_limit=1G ./vendor/bin/pest --exclude-group=mockery-alias --coverage --min=55
        env:
          XDEBUG_MODE: coverage
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_test
          DB_USERNAME: aurora
          DB_PASSWORD: secret
          DB_MIGRATIONS_TABLE: public.migrations
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  # ── Frontend: typecheck + test + build ─────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest
        working-directory: frontend
        run: npm test -- --run --reporter=verbose

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          # The SPA shell (app.blade.php) reads build/.vite/manifest.json. That
          # dir is hidden, and upload-artifact@v4 excludes hidden files by
          # default — without this the manifest is dropped, the SPA never
          # renders under `artisan serve`, and every E2E (login) times out.
          include-hidden-files: true
          retention-days: 7

  # ── AI Service: lint + type check + tests ──────────────────────────────────
  ai:
    name: AI Service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('ai/requirements.txt') }}
          restore-keys: pip-

      - name: Install
        working-directory: ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff (lint)
        working-directory: ai
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Ruff (format check)
        working-directory: ai
        run: ruff format app/ --check

      - name: mypy (type check)
        working-directory: ai
        run: mypy app/ --ignore-missing-imports --no-error-summary

      - name: pytest
        working-directory: ai
        run: pytest tests/ -v --tb=short

  # ── Federation: lint + tests ───────────────────────────────────────────────
  federation:
    name: Federation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install
        working-directory: federation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest
        working-directory: federation
        run: pytest tests/ -v --tb=short

  # ── Security audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (critical/high)
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Composer audit
        working-directory: backend
        run: composer install --no-interaction --no-progress && composer audit

      - name: pip audit
        working-directory: ai
        run: |
          pip install pip-audit
          # Audit ONLY the declared dependency set (-r requirements.txt), NOT the
          # ambient environment. Without -r, pip-audit also scans the runner's
          # pre-installed OS Python packages (cryptography, twisted, requests,
          # urllib3, …) — dozens of false positives that have nothing to do with
          # Aurora's supply chain.
          #
          # W0-T03b cleared the transitive CVEs by pinning fastapi 0.138 (drops
          # the starlette<1.0 cap), starlette 1.3.1, mcp[cli] 1.28.0, pydantic
          # 2.13.4 (+ markdown 3.8.1, pytest 9.0.3, python-dotenv 1.2.2).
          # Validated against the live BioMCP evidence path (PubMed/trials/variants).
          #
          # Only diskcache CVE-2025-69872 remains: no upstream fix exists (5.6.3
          # is the latest release AND biomcp-python's required minimum), so it
          # cannot be cleared without dropping biomcp-python. Kept ignored.
          # Any NEW or non-listed vulnerability still fails this job.
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2025-69872

  # ── Secret scan ────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan working tree
        # --no-git scans files on disk (not history) so the job is not blocked by
        # the pre-rotation Orthanc credential still present in git history. Enable
        # full-history scanning (drop --no-git) after the W2-T03 history scrub.
        run: gitleaks detect --no-git --redact --no-banner --source . --config .gitleaks.toml

  # ── E2E (Playwright) — runs after frontend build ──────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-test, frontend]
    # Runs on PRs and on pushes (incl. main) so it can gate deploy.

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aurora_e2e
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U aurora"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, pcntl, zip, redis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: backend/public/build/

      - name: Install backend
        working-directory: backend
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          cp .env.example .env
          php artisan key:generate

      - name: Seed E2E database
        working-directory: backend
        run: |
          php artisan migrate --force
          php artisan db:seed
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_e2e
          DB_USERNAME: aurora
          DB_PASSWORD: secret

      - name: Start Laravel server
        working-directory: backend
        run: php artisan serve --port=8085 &
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_e2e
          DB_USERNAME: aurora
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          # `artisan serve` uses PHP's built-in server, single-threaded by
          # default. The SPA fires a config request on mount, and a second
          # request (e.g. the login POST) then queues behind it until timeout —
          # which is why the invalid-credentials test saw no error render.
          # Allow concurrent request handling.
          PHP_CLI_SERVER_WORKERS: "4"

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=html
        env:
          BASE_URL: http://127.0.0.1:8085

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/playwright-report/
          retention-days: 14

  # ── Deploy — only on main push, after all checks pass ─────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-test, frontend, ai, security, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/smudoshi/Github/Aurora
            git pull origin main
            cd backend && composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ../frontend && npm ci && npm run build
            rm -rf ../backend/public/build
            cp -r dist ../backend/public/build
            echo "Deployed at $(date)"
