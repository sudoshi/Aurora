name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — PHP style and Pest tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Laravel/PHP)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: secret
        ports: ["5485:5432"]
        options: >-
          --health-cmd="pg_isready -U aurora"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, pcntl, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Run Pest (tests)
        run: ./vendor/bin/pest --parallel
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5485
          DB_DATABASE: aurora_test
          DB_USERNAME: aurora
          DB_PASSWORD: secret

  # ---------------------------------------------------------------------------
  # Frontend — type check, unit tests, and build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Vite/React)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run Vitest (unit tests)
        run: npx vitest run

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Security — dependency audit (main branch only)
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical)
        run: npm audit --audit-level=critical

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Composer audit
        run: composer audit
        continue-on-error: true
