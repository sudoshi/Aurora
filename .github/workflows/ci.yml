name: Aurora CI

on:
  push:
    branches: [main, "v2/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Backend: lint + static analysis + tests ────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, mbstring, bcmath, intl, zip, redis
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (code style)
        working-directory: backend
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        working-directory: backend
        run: |
          if [ -f vendor/bin/phpstan ]; then
            ./vendor/bin/phpstan analyse --memory-limit=512M
          else
            echo "PHPStan not installed, skipping"
          fi

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend-lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U aurora"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, pcntl, zip, redis
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install
        working-directory: backend
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare env
        working-directory: backend
        run: cp .env.example .env && php artisan key:generate

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_test
          DB_USERNAME: aurora
          DB_PASSWORD: secret

      - name: Pest tests
        working-directory: backend
        run: ./vendor/bin/pest --parallel --coverage --min=40
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_test
          DB_USERNAME: aurora
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  # ── Frontend: typecheck + test + build ─────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest
        working-directory: frontend
        run: npm test -- --run --reporter=verbose
        continue-on-error: true  # Enforce once test coverage >40%

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ── AI Service: lint + type check + tests ──────────────────────────────────
  ai:
    name: AI Service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('ai/requirements.txt') }}
          restore-keys: pip-

      - name: Install
        working-directory: ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff (lint)
        working-directory: ai
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Ruff (format check)
        working-directory: ai
        run: ruff format app/ --check
        continue-on-error: true

      - name: mypy (type check)
        working-directory: ai
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Enforce once stubs are complete

      - name: pytest
        working-directory: ai
        run: pytest tests/ -v --tb=short

  # ── Federation: lint + tests ───────────────────────────────────────────────
  federation:
    name: Federation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install
        working-directory: federation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest
        working-directory: federation
        run: pytest tests/ -v --tb=short

  # ── Security audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (critical/high)
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high
        continue-on-error: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Composer audit
        working-directory: backend
        run: composer install --no-interaction --no-progress && composer audit

      - name: pip audit
        working-directory: ai
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit
        continue-on-error: true

  # ── E2E (Playwright) — runs after frontend build ──────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-test, frontend]
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aurora_e2e
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U aurora"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, pcntl, zip, redis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: backend/public/build/

      - name: Install backend
        working-directory: backend
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          cp .env.example .env
          php artisan key:generate

      - name: Seed E2E database
        working-directory: backend
        run: |
          php artisan migrate --force
          php artisan db:seed
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_e2e
          DB_USERNAME: aurora
          DB_PASSWORD: secret

      - name: Start Laravel server
        working-directory: backend
        run: php artisan serve --port=8085 &
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: aurora_e2e
          DB_USERNAME: aurora
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=html
        env:
          BASE_URL: http://127.0.0.1:8085

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/playwright-report/
          retention-days: 14

  # ── Deploy — only on main push, after all checks pass ─────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-test, frontend, ai, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/smudoshi/Github/Aurora
            git pull origin main
            cd backend && composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ../frontend && npm ci && npm run build
            rm -rf ../backend/public/build
            cp -r dist ../backend/public/build
            echo "Deployed at $(date)"
