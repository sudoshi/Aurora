<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Aurora arc gradient: cyan → green → violet -->
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#00D68F"/>
      <stop offset="100%" stop-color="#9D75F8"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33E0A8"/>
      <stop offset="50%" stop-color="#9D75F8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="arc3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9D75F8"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#00D68F"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Aurora arcs — sweeping bands rising from horizon -->
  <g filter="url(#glow)">
    <!-- Outermost arc — wide and soft -->
    <path d="M6,52 Q16,14 32,10 Q48,14 58,52"
          fill="none" stroke="url(#arc1)" stroke-width="3.5"
          stroke-linecap="round" opacity="0.5"/>
    <!-- Middle arc -->
    <path d="M12,50 Q20,18 32,14 Q44,18 52,50"
          fill="none" stroke="url(#arc2)" stroke-width="3"
          stroke-linecap="round" opacity="0.7"/>
    <!-- Inner arc — brightest -->
    <path d="M18,48 Q24,22 32,18 Q40,22 46,48"
          fill="none" stroke="url(#arc3)" stroke-width="2.5"
          stroke-linecap="round" opacity="0.9"/>
    <!-- Core arc — sharp green -->
    <path d="M23,46 Q27,26 32,22 Q37,26 41,46"
          fill="none" stroke="#00D68F" stroke-width="2"
          stroke-linecap="round" opacity="1"/>
  </g>

  <!-- Horizon line — subtle ground reference -->
  <line x1="4" y1="52" x2="60" y2="52"
        stroke="#4A5068" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Star accents -->
  <circle cx="10" cy="12" r="1" fill="#E8ECF4" opacity="0.7"/>
  <circle cx="52" cy="8" r="0.8" fill="#E8ECF4" opacity="0.5"/>
  <circle cx="45" cy="16" r="0.6" fill="#E8ECF4" opacity="0.4"/>
  <circle cx="18" cy="8" r="0.7" fill="#E8ECF4" opacity="0.6"/>
  <circle cx="32" cy="6" r="0.9" fill="#00D68F" opacity="0.6"/>
</svg>
