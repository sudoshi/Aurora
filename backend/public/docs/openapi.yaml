          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "<!DOCTYPE html>\n<html>\n    <head>\n        <meta charset=\"UTF-8\" />\n        <meta http-equiv=\"refresh\" content=\"0;url='https://auth.acumenus.net/application/o/authorize/?response_type=code&amp;client_id=59Rf_W0PV-M0m6c9W-OaPlbuYWbuIzB71nH3bbhkpsU&amp;redirect_uri=%2Fapi%2Fauth%2Foidc%2Fcallback&amp;scope=openid+profile+email+groups&amp;state=zCELUQEorxYeqY1VHXnLuCqxLhzlFK1B3lPdHrp9dX7tVNTX&amp;nonce=zq0Bq60Vs77XxvL4ol8a42n8Nj7tQdEP&amp;code_challenge=bcqqxa31YqdviLkpvkIUJwV8Xt3TvIJXCDRMdx2gzYg&amp;code_challenge_method=S256'\" />\n\n        <title>Redirecting to https://auth.acumenus.net/application/o/authorize/?response_type=code&amp;client_id=59Rf_W0PV-M0m6c9W-OaPlbuYWbuIzB71nH3bbhkpsU&amp;redirect_uri=%2Fapi%2Fauth%2Foidc%2Fcallback&amp;scope=openid+profile+email+groups&amp;state=zCELUQEorxYeqY1VHXnLuCqxLhzlFK1B3lPdHrp9dX7tVNTX&amp;nonce=zq0Bq60Vs77XxvL4ol8a42n8Nj7tQdEP&amp;code_challenge=bcqqxa31YqdviLkpvkIUJwV8Xt3TvIJXCDRMdx2gzYg&amp;code_challenge_method=S256</title>\n    </head>\n    <body>\n        Redirecting to <a href=\"https://auth.acumenus.net/application/o/authorize/?response_type=code&amp;client_id=59Rf_W0PV-M0m6c9W-OaPlbuYWbuIzB71nH3bbhkpsU&amp;redirect_uri=%2Fapi%2Fauth%2Foidc%2Fcallback&amp;scope=openid+profile+email+groups&amp;state=zCELUQEorxYeqY1VHXnLuCqxLhzlFK1B3lPdHrp9dX7tVNTX&amp;nonce=zq0Bq60Vs77XxvL4ol8a42n8Nj7tQdEP&amp;code_challenge=bcqqxa31YqdviLkpvkIUJwV8Xt3TvIJXCDRMdx2gzYg&amp;code_challenge_method=S256\">https://auth.acumenus.net/application/o/authorize/?response_type=code&amp;client_id=59Rf_W0PV-M0m6c9W-OaPlbuYWbuIzB71nH3bbhkpsU&amp;redirect_uri=%2Fapi%2Fauth%2Foidc%2Fcallback&amp;scope=openid+profile+email+groups&amp;state=zCELUQEorxYeqY1VHXnLuCqxLhzlFK1B3lPdHrp9dX7tVNTX&amp;nonce=zq0Bq60Vs77XxvL4ol8a42n8Nj7tQdEP&amp;code_challenge=bcqqxa31YqdviLkpvkIUJwV8Xt3TvIJXCDRMdx2gzYg&amp;code_challenge_method=S256</a>.\n    </body>\n</html>"
      tags:
        - Endpoints
      security: []
  /api/auth/oidc/callback:
    get:
      summary: ''
      operationId: getApiAuthOidcCallback
      description: ''
      parameters: []
      responses:
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: oidc_failed
                  reason: missing_parameters
                properties:
                  error:
                    type: string
                    example: oidc_failed
                  reason:
                    type: string
                    example: missing_parameters
      tags:
        - Endpoints
      security: []
  /api/auth/oidc/exchange:
    post:
      summary: ''
      operationId: postApiAuthOidcExchange
      description: ''
      parameters: []
      responses:
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: oidc_failed
                  reason: missing_code
                properties:
                  error:
                    type: string
                    example: oidc_failed
                  reason:
                    type: string
                    example: missing_code
