openapi: 3.0.3
info:
  title: 'Aurora API'
  description: 'API documentation for Aurora, a secure real-time collaboration platform for multidisciplinary clinical teams. For Research Use Only — not for diagnostic or clinical decision-making use.'
  version: 1.0.0
servers:
  -
    url: 'https://aurora.acumenus.net'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Aurora uses Laravel Sanctum bearer tokens. Authenticate via <code>POST /api/login</code> to obtain a token, then send it in the <code>Authorization: Bearer {token}</code> header.'
security:
  -
    default: []
paths:
  /api/health:
    get:
      summary: 'Liveness — the process is up and serving.'
      operationId: livenessTheProcessIsUpAndServing
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: ok
                  service: aurora-api
                  version: 2.0.0
                  timestamp: '2026-06-21T00:38:12+00:00'
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: aurora-api
                  version:
                    type: string
                    example: 2.0.0
                  timestamp:
                    type: string
                    example: '2026-06-21T00:38:12+00:00'
      tags:
        - Endpoints
      security: []
  /api/health/ready:
    get:
      summary: "Readiness — critical dependencies are reachable. Returns 503 when any\nhard dependency is down so orchestrators stop routing traffic."
      operationId: readinessCriticalDependenciesAreReachableReturns503WhenAnyHardDependencyIsDownSoOrchestratorsStopRoutingTraffic
      description: ''
      parameters: []
      responses:
        503:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: degraded
                  checks:
                    database: up
                    redis: down
                    cache: up
                  timestamp: '2026-06-21T00:38:12+00:00'
                properties:
                  status:
                    type: string
                    example: degraded
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        example: up
                      redis:
                        type: string
                        example: down
                      cache:
                        type: string
                        example: up
                  timestamp:
                    type: string
                    example: '2026-06-21T00:38:12+00:00'
      tags:
        - Endpoints
      security: []
  /api/mme/v1/match:
    post:
      summary: ''
      operationId: postApiMmeV1Match
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Unauthorized: invalid or missing X-Auth-Token.'
                properties:
                  message:
                    type: string
                    example: 'Unauthorized: invalid or missing X-Auth-Token.'
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patient:
                  type: object
                  description: ''
                  example: []
                  properties:
                    id:
                      type: string
                      description: 'Must not be greater than 255 characters.'
                      example: b
                    features:
                      type: array
                      description: ''
                      example: null
                      items:
                        type: object
                        nullable: true
                        properties:
                          id:
                            type: string
                            description: 'This field is required when <code>patient.features</code> is present. Must match the regex /^HP:\d{7}$/.'
                            example: 'HP:5642559'
                    genomicFeatures:
                      type: array
                      description: ''
                      example: null
                      items:
                        type: object
                        nullable: true
                        properties:
                          gene:
                            type: object
                            description: ''
                            example: []
                            properties:
                              id:
                                type: string
                                description: 'This field is required when <code>patient.genomicFeatures</code> is present.'
                                example: architecto
                  required:
                    - id
              required:
                - patient
      security: []
  /api/beacon:
    get:
      summary: ''
      operationId: getApiBeacon
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  meta:
                    beaconId: org.aurora.beacon
                    apiVersion: v2.0.0
                    returnedSchemas: []
                    returnedGranularity: boolean
                    receivedRequestSummary: []
                  response:
                    id: org.aurora.beacon
                    name: 'Aurora Beacon'
                    apiVersion: v2.0.0
                    environment: prod
                    organization:
                      id: org.aurora
                      name: Aurora
                    welcomeUrl: 'https://aurora.example.org'
                properties:
                  meta:
                    type: object
                    properties:
                      beaconId:
                        type: string
                        example: org.aurora.beacon
                      apiVersion:
                        type: string
                        example: v2.0.0
                      returnedSchemas:
                        type: array
                        example: []
                      returnedGranularity:
                        type: string
                        example: boolean
                      receivedRequestSummary:
                        type: array
                        example: []
                  response:
                    type: object
                    properties:
                      id:
                        type: string
                        example: org.aurora.beacon
                      name:
                        type: string
                        example: 'Aurora Beacon'
                      apiVersion:
                        type: string
                        example: v2.0.0
                      environment:
                        type: string
                        example: prod
                      organization:
                        type: object
                        properties:
                          id:
                            type: string
                            example: org.aurora
                          name:
                            type: string
                            example: Aurora
                      welcomeUrl:
                        type: string
                        example: 'https://aurora.example.org'
      tags:
        - Endpoints
      security: []
  /api/beacon/info:
    get:
      summary: ''
      operationId: getApiBeaconInfo
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  meta:
                    beaconId: org.aurora.beacon
                    apiVersion: v2.0.0
                    returnedSchemas: []
                    returnedGranularity: boolean
                    receivedRequestSummary: []
                  response:
                    id: org.aurora.beacon
                    name: 'Aurora Beacon'
                    apiVersion: v2.0.0
                    environment: prod
                    organization:
                      id: org.aurora
                      name: Aurora
                    welcomeUrl: 'https://aurora.example.org'
                properties:
                  meta:
                    type: object
                    properties:
                      beaconId:
                        type: string
                        example: org.aurora.beacon
                      apiVersion:
                        type: string
                        example: v2.0.0
                      returnedSchemas:
                        type: array
                        example: []
                      returnedGranularity:
                        type: string
                        example: boolean
                      receivedRequestSummary:
                        type: array
                        example: []
                  response:
                    type: object
                    properties:
                      id:
                        type: string
                        example: org.aurora.beacon
                      name:
                        type: string
                        example: 'Aurora Beacon'
                      apiVersion:
                        type: string
                        example: v2.0.0
                      environment:
                        type: string
                        example: prod
                      organization:
                        type: object
                        properties:
                          id:
                            type: string
                            example: org.aurora
                          name:
                            type: string
                            example: Aurora
                      welcomeUrl:
                        type: string
                        example: 'https://aurora.example.org'
      tags:
        - Endpoints
      security: []
  /api/beacon/service-info:
    get:
      summary: ''
      operationId: getApiBeaconServiceInfo
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: org.aurora.beacon
                  name: 'Aurora Beacon'
                  type:
                    group: org.ga4gh
                    artifact: beacon
                    version: 2.0.0
                  organization:
                    name: Aurora
                    url: 'https://aurora.example.org'
                  version: 2.0.0
                properties:
                  id:
                    type: string
                    example: org.aurora.beacon
                  name:
                    type: string
                    example: 'Aurora Beacon'
                  type:
                    type: object
                    properties:
                      group:
                        type: string
                        example: org.ga4gh
                      artifact:
                        type: string
                        example: beacon
                      version:
                        type: string
                        example: 2.0.0
                  organization:
                    type: object
                    properties:
                      name:
                        type: string
                        example: Aurora
                      url:
                        type: string
                        example: 'https://aurora.example.org'
                  version:
                    type: string
                    example: 2.0.0
      tags:
        - Endpoints
      security: []
  /api/beacon/configuration:
    get:
      summary: ''
      operationId: getApiBeaconConfiguration
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  meta:
                    beaconId: org.aurora.beacon
                    apiVersion: v2.0.0
                    returnedSchemas: []
                    returnedGranularity: boolean
                    receivedRequestSummary: []
                  response:
                    $schema: 'https://raw.githubusercontent.com/ga4gh-beacon/beacon-v2/main/framework/json/configuration/beaconConfigurationSchema.json'
                    maturityAttributes:
                      productionStatus: DEV
                    entryTypes:
                      genomicVariant:
                        id: genomicVariant
                        name: 'Genomic Variant'
                        ontologyTermForThisType:
                          id: 'ENSGLOSSARY:0000092'
                          label: 'Genomic Variant'
                        defaultSchema:
                          id: ga4gh-beacon-variant-v2.0.0
                          name: 'Default schema for a genomic variant'
                properties:
                  meta:
                    type: object
                    properties:
                      beaconId:
                        type: string
                        example: org.aurora.beacon
                      apiVersion:
                        type: string
                        example: v2.0.0
                      returnedSchemas:
                        type: array
                        example: []
                      returnedGranularity:
                        type: string
                        example: boolean
                      receivedRequestSummary:
                        type: array
                        example: []
                  response:
                    type: object
                    properties:
                      $schema:
                        type: string
                        example: 'https://raw.githubusercontent.com/ga4gh-beacon/beacon-v2/main/framework/json/configuration/beaconConfigurationSchema.json'
                      maturityAttributes:
                        type: object
                        properties:
                          productionStatus:
                            type: string
                            example: DEV
                      entryTypes:
                        type: object
                        properties:
                          genomicVariant:
                            type: object
                            properties:
                              id:
                                type: string
                                example: genomicVariant
                              name:
                                type: string
                                example: 'Genomic Variant'
                              ontologyTermForThisType:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: 'ENSGLOSSARY:0000092'
                                  label:
                                    type: string
                                    example: 'Genomic Variant'
                              defaultSchema:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: ga4gh-beacon-variant-v2.0.0
                                  name:
                                    type: string
