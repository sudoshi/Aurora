                example:
                  meta:
                    beaconId: org.aurora.beacon
                    apiVersion: v2.0.0
                    returnedSchemas: []
                    returnedGranularity: boolean
                    receivedRequestSummary: []
                  responseSummary:
                    exists: false
                properties:
                  meta:
                    type: object
                    properties:
                      beaconId:
                        type: string
                        example: org.aurora.beacon
                      apiVersion:
                        type: string
                        example: v2.0.0
                      returnedSchemas:
                        type: array
                        example: []
                      returnedGranularity:
                        type: string
                        example: boolean
                      receivedRequestSummary:
                        type: array
                        example: []
                  responseSummary:
                    type: object
                    properties:
                      exists:
                        type: boolean
                        example: false
