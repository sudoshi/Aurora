                    returnedSchemas: []
                    returnedGranularity: boolean
                    receivedRequestSummary: []
                  response:
                    endpointSets:
                      genomicVariant:
                        entryType: genomicVariant
                        rootUrl: 'https://aurora.acumenus.net/api/beacon/g_variants'
                properties:
                  meta:
                    type: object
                    properties:
                      beaconId:
                        type: string
                        example: org.aurora.beacon
                      apiVersion:
                        type: string
                        example: v2.0.0
